name: 'Pipeline 04/07/26'

on:
  # Habilita botão na interface Web para acionar manualmente a pipeline
  push:
    branches: 
      - main
  workflow_dispatch:

jobs:
  integracao:
    name: 'Integração'
    runs-on: ubuntu-latest
    steps:
      # Equivalente a git clone
      - uses: actions/checkout@v4
      - name: 'Instalação de dependências'
        run: pip install -r requirements.txt
      - name: 'Testes unitários'
        run: pytest
      - name: 'Cobertura de código'
        run: pytest --cov
      - name: 'Análise estática'
        run: bandit -r app/
      - name: 'Linting'
        run: pylint app/ || true